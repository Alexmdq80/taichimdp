<div class="login-wrapper flex-col">
    <div class="text-center mb-4">
        <img src="/src/assets/logo.png" alt="Logo" style="height: 80px; margin-bottom: 1rem;">
        <h1 class="mb-0">Sistema de Gestión de Clases</h1>
    </div>
    
    <section class="login-container card">
        <div class="text-center mb-4">
            <h2 class="mb-1">¡Bienvenido!</h2>
            <p class="text-muted">Por favor, ingresa tus credenciales</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2">Entrar</button>
            <p class="error-message" id="login-error-message" style="display: none;"></p>
            <p class="text-center mt-3">¿No tienes una cuenta? <a href="/register">Regístrate aquí</a></p>
        </form>
    </section>
</div>
